<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #222;
      color: white;
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 170px;
      overflow: hidden;
      position: relative;
    }
    .row { display: flex; align-items: center; justify-content: center; width: 100%; gap: 15px; }
    .label-text { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

    input {
      background: #333;
      border: 1px solid #555;
      color: white;
      padding: 8px;
      text-align: center;
      width: 80px;
      font-size: 18px;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: #666; font-style: italic; }
    input:focus-visible { border-color: #888; box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }

    button { cursor: pointer; background: none; border: none; color: white; transition: transform 0.1s, opacity 0.2s; }
    button:active { transform: scale(0.9); }
    button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    #undoBtn { font-size: 20px; width: 24px; }

    .row-3 { justify-content: space-between; }
    .text-link-btn { font-size: 12px; color: #aaa; text-decoration: underline; width: 70px; text-align: left; }
    .text-link-btn:hover { color: #fff; }
    .text-link-btn.locked { color: #ff4444; }
    .empty-space { width: 70px; }

    .done-btn {
      background: #444;
      padding: 8px 30px;
      border-radius: 20px;
      font-size: 14px;
      border: 1px solid #666;
      width: 100px;
    }
    .done-btn:hover { background: #555; }

    #sceneWarning {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #ffa;
      text-align: center;
      padding: 10px;
      z-index: 10;
    }
    #sceneWarning.visible { display: flex; }

    .toast {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      background: #aa3333;
      color: white;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      transition: bottom 0.3s ease-in-out, opacity 0.3s ease-in-out;
      opacity: 0;
      pointer-events: none;
    }
    .toast.show { bottom: 5px; opacity: 1; }
  </style>
</head>
<body>

  <div id="sceneWarning" class="visible">
    Open a scene to use<br>the Area Labeler tool.
  </div>

  <div class="row">
    <label for="labelInput" class="label-text">Area Label</label>
  </div>

  <div class="row">
    <div style="width: 24px;"></div>
    <input type="text" id="labelInput" maxlength="6" placeholder="A1" autocomplete="off" spellcheck="false">
    <button id="undoBtn" aria-label="Undo last label" title="Undo" disabled>↩️</button>
  </div>

  <div class="row row-3">
    <button id="lockTextBtn" class="text-link-btn">Lock All</button>
    <button class="done-btn" id="doneBtn" aria-label="Finish and close">Done</button>
    <div class="empty-space"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import OBR, { buildLabel } from "https://unpkg.com/@owlbear-rodeo/sdk/dist/obr-sdk.js";

    const ID        = "com.area.labeler";
    const META_KEY  = `${ID}/lastLabel`;

    const input     = document.getElementById("labelInput");
    const lockBtn   = document.getElementById("lockTextBtn");
    const undoBtn   = document.getElementById("undoBtn");
    const doneBtn   = document.getElementById("doneBtn");
    const toast     = document.getElementById("toast");
    const sceneWarn = document.getElementById("sceneWarning");

    let isLocked      = false;
    let actionHistory = [];  // { ids: string[], previousLabel: string }[]
    let toastTimeout;

    // ── Helpers ───────────────────────────────────────────────────────────────

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove("show"), 3000);
    }

    function updateUndoState() {
      undoBtn.disabled = actionHistory.length === 0;
    }

    function increment(str) {
      if (!str) return "A1";
      const suffixMatch = str.match(/[-:_]+$/);
      const suffix = suffixMatch ? suffixMatch[0] : "";
      const base   = suffix ? str.slice(0, -suffix.length) : str;

      if (/\d+$/.test(base)) {
        return base.replace(/\d+$/, (n) =>
          String(parseInt(n, 10) + 1).padStart(n.length, "0")
        ) + suffix;
      }
      if (/[a-zA-Z]$/.test(base)) {
        const last = base.slice(-1);
        if (last.toLowerCase() === "z") {
          return base + (last === "Z" ? "A" : "a") + suffix;
        }
        return base.slice(0, -1) + String.fromCharCode(last.charCodeAt(0) + 1) + suffix;
      }
      return base + suffix;
    }

    function persistLabel(value) {
      OBR.room.setMetadata({ [META_KEY]: value }).catch(console.error);
    }

    function setSceneReady(ready) {
      sceneWarn.classList.toggle("visible", !ready);
      if (!ready) {
        isLocked = false;
        lockBtn.textContent = "Lock All";
        lockBtn.classList.remove("locked");
        actionHistory = [];
        updateUndoState();
      }
    }

    // ── Input validation ──────────────────────────────────────────────────────

    input.addEventListener("input", (e) => {
      const original  = e.target.value;
      const sanitized = original.replace(/[^a-zA-Z0-9\-_:]/g, "");
      if (original !== sanitized) showToast("Allowed characters: A–Z, 0–9, : _ -");
      e.target.value = sanitized;
      persistLabel(sanitized);
    });

    input.addEventListener("focus", () => input.select());

    // ── Lock / Unlock All ─────────────────────────────────────────────────────

    lockBtn.addEventListener("click", async () => {
      try {
        if (!await OBR.scene.isReady()) return;
        isLocked = !isLocked;
        lockBtn.textContent = isLocked ? "Unlock All" : "Lock All";
        lockBtn.classList.toggle("locked", isLocked);
        await OBR.scene.items.updateItems(
          (item) => Boolean(item.metadata[`${ID}/isLabel`]),
          (items) => { for (const item of items) item.locked = isLocked; }
        );
      } catch (err) {
        console.error("Lock toggle failed:", err);
        showToast("Failed to toggle lock.");
      }
    });

    // ── Undo ──────────────────────────────────────────────────────────────────

    undoBtn.addEventListener("click", async () => {
      if (actionHistory.length === 0) return;
      const last = actionHistory.pop();
      try {
        await OBR.scene.items.deleteItems(last.ids);
        input.value = last.previousLabel;
        persistLabel(last.previousLabel);
      } catch (err) {
        console.error("Undo failed:", err);
        actionHistory.push(last);
        showToast("Undo failed — try again.");
      }
      updateUndoState();
    });

    // ── Done / Escape ─────────────────────────────────────────────────────────

    doneBtn.addEventListener("click",  () => OBR.action.close().catch(console.error));
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") OBR.action.close().catch(console.error);
    });

    // ── OBR init ──────────────────────────────────────────────────────────────

    OBR.onReady(async () => {

      // 1. Restore persisted label
      try {
        const saved = await OBR.room.getMetadata();
        if (typeof saved[META_KEY] === "string") input.value = saved[META_KEY];
      } catch { /* non-fatal */ }

      // 2. Scene readiness
      try { setSceneReady(await OBR.scene.isReady()); }
      catch { setSceneReady(false); }
      OBR.scene.onReadyChange(setSceneReady);

      // 3. Register the toolbar tool.
      //    Wrapped in try/catch: if the popover is closed and reopened, OBR
      //    keeps the registration alive and will throw on a duplicate create.
      //    We treat that throw as a no-op — the existing registration is fine.
      try {
        await OBR.tool.create({
          id: `${ID}/tool`,
          icons: [{ icon: "/area-labeler/icon.svg", label: "Area Labeler" }],
        });
      } catch { /* already registered */ }

      // 4. Register the click-to-place mode. Same duplicate guard.
      //    Because the popover and the tool mode share the same JS context,
      //    onToolClick can read `input.value` directly — no metadata round-trip.
      try {
        await OBR.tool.createMode({
          id: `${ID}/mode`,
          icons: [{
            icon: "/area-labeler/icon.svg",
            label: "Place Label",
            filter: { activeTools: [`${ID}/tool`] },
          }],

          async onToolClick(_context, event) {
            try {
              if (!await OBR.scene.isReady()) return;

              const currentLabel = input.value || "A1";
              const pos = event.pointerPosition;

              const label = buildLabel()
                .plainText(currentLabel)
                .position(pos)
                .layer("NOTE")
                .fontSize(16)
                .fontWeight(700)
                .fillColor("#F5F5DC")
                .strokeColor("#000000")
                .strokeWidth(1)
                .textAlign("CENTER")
                .textAlignVertical("MIDDLE")
                .metadata({ [`${ID}/isLabel`]: true })
                .build();

              await OBR.scene.items.addItems([label]);
              await OBR.scene.items.selectItems([label.id]);

              actionHistory.push({ ids: [label.id], previousLabel: currentLabel });
              updateUndoState();

              const next = increment(currentLabel);
              input.value = next;
              persistLabel(next);

            } catch (err) {
              console.error("Area Labeler: place failed:", err);
              showToast("Failed to place label.");
            }
          },
        });
      } catch { /* already registered */ }
    });
  </script>
</body>
</html>
