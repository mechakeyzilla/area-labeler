<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: system-ui, sans-serif; background: #222; color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 170px; overflow: hidden; position: relative; }
    .row { display: flex; align-items: center; justify-content: center; width: 100%; gap: 15px; }
    .label-text { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    input { background: #333; border: 1px solid #555; color: white; padding: 8px; text-align: center; width: 80px; font-size: 18px; border-radius: 4px; outline: none; transition: border-color 0.2s; }
    input:focus-visible { border-color: #888; box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }
    button { cursor: pointer; background: none; border: none; color: white; transition: transform 0.1s, opacity 0.2s; }
    button:active { transform: scale(0.9); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    #undoBtn { font-size: 20px; width: 24px; }
    .row-3 { justify-content: space-between; width: 100%; }
    .text-link-btn { font-size: 12px; color: #aaa; text-decoration: underline; width: 70px; text-align: left; }
    .done-btn { background: #444; padding: 8px 20px; border-radius: 20px; font-size: 14px; border: 1px solid #666; }
  </style>
</head>
<body>

  <div class="row">
    <label class="label-text">Area Label</label>
  </div>

  <div class="row">
    <div style="width: 24px;"></div> 
    <input type="text" id="labelInput" maxlength="6" value="A1" autocomplete="off">
    <button id="undoBtn" title="Undo" disabled>↩️</button>
  </div>

  <div class="row row-3">
    <button id="lockTextBtn" class="text-link-btn">Lock All</button>
    <button class="done-btn" id="doneBtn">Done</button>
    <div style="width: 70px;"></div>
  </div>

  <script type="module">
    import OBR from "https://unpkg.com/@owlbear-rodeo/sdk/dist/obr-sdk.js";

    const ID = "com.area.labeler";
    const input = document.getElementById('labelInput');
    const undoBtn = document.getElementById('undoBtn');
    
    let actionHistory = [];

    OBR.onReady(async () => {
      // Create the tool in the right-hand sidebar
      OBR.tool.create({
        id: `${ID}/tool`,
        icons: [{ 
          icon: "icon.svg", // Using simple relative path
          label: "Area Labeler" 
        }],
        onClick: async (context, event) => {
          const pos = event.pointerPosition;
          const currentText = input.value || "A1";

          // Create the parchment circle
          const circle = OBR.item.createShape({
            width: 40,
            height: 40,
            shapeType: "CIRCLE",
            fillColor: "#F5F5DC",
            strokeColor: "#000000",
            strokeWidth: 2,
            position: { x: pos.x - 20, y: pos.y - 20 },
          })
          .setLayer("NOTE")
          .setMetadata({ [`${ID}/isLabel`]: true })
          .setVisible(true) // Visible for testing
          .build();

          // Create the text
          const text = OBR.item.createText({
            text: { plainText: currentText, richText: "" },
            position: pos,
            fontSize: 18,
            fontWeight: 700,
            textAlign: "CENTER",
            textAlignVertical: "MIDDLE"
          })
          .setLayer("NOTE")
          .setMetadata({ [`${ID}/isLabel`]: true })
          .setVisible(true) // Visible for testing
          .build();

          await OBR.scene.items.addItems([circle, text]);
          actionHistory.push([circle.id, text.id]);
          undoBtn.disabled = false;

          // Increment logic
          input.value = currentText.replace(/\d+$/, n => (parseInt(n) + 1).toString().padStart(n.length, '0'));
        }
      });
    });

    undoBtn.onclick = async () => {
      if (actionHistory.length > 0) {
        const ids = actionHistory.pop();
        await OBR.scene.items.deleteItems(ids);
        undoBtn.disabled = actionHistory.length === 0;
      }
    };

    document.getElementById('doneBtn').onclick = () => OBR.popover.close(ID);
  </script>
</body>
</html>
